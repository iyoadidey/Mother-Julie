{% csrf_token %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email - Mother Julie</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 10px;
      
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      color: #222;
    }
    p {
      margin: 0 0 16px;
      color: #555;
      line-height: 1.4;
    }
    .messages {
      margin-bottom: 12px;
    }
    .msg {
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .msg.error { background: #ffe7e7; color: #8f1d1d; }
    .msg.success { background: #e9f8ec; color: #1d6b30; }
    input {
      width: 100%;
      margin-bottom: 12px;
      padding: 12px;
      border: 1px solid #d6d6d6;
      border-radius: 6px;
      font-size: 14px;
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      border: none;
      border-radius: 6px;
      padding: 12px;
      font-weight: bold;
      cursor: pointer;
    }
    .verify-btn {
      background: #d63384;
      color: #fff;
    }
    .resend-btn {
      background: #ececec;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Verify your Gmail</h1>
    <p>Enter the 6-digit code sent to your Gmail account to complete your registration.</p>

    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="msg {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    <form method="post" action="{% url 'verify_signup_otp' %}">
      {% csrf_token %}
      <input type="email" name="email" placeholder="Gmail address" value="{{ email }}" required />
      <input type="text" name="otp" placeholder="6-digit OTP" minlength="6" maxlength="6" required />
      <div class="actions">
        <button class="verify-btn" type="submit" name="action" value="verify">Verify</button>
        <button class="resend-btn" type="submit" name="action" value="resend" formnovalidate>Resend Code</button>
      </div>
    </form>
  </div>
</body>
</html>

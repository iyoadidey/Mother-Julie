<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — Mother Julie</title>
    {% load static %}
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" />
    <link href="{% static 'signin.css' %}" rel="stylesheet" />
    <style>
        .reset-wrapper { max-width: 420px; margin: 48px auto; padding: 24px; background: #fff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        .reset-title { text-align: center; margin-bottom: 8px; color: #ff5b89; font-weight: 800; letter-spacing: .3px; }
        .reset-sub { text-align: center; margin-bottom: 24px; color: #666; font-size: .95rem; }
        .reset-actions { margin-top: 12px; text-align: center; }
        .reset-link { color: #ff5b89; text-decoration: none; font-weight: 600; }
        .alert{padding:11px 14px;border-radius:8px;margin-bottom:15px;text-align:center;font-size:0.9rem;}
        .alert-success{background:#e9f9f6;color:#1b6e59;}
        .alert-error{background:#fdecea;color:#b92130;}
    </style>
</head>
<body>
    <div class="reset-wrapper">
        <h1 class="reset-title">Create a new password</h1>
        <p class="reset-sub">Hi {{ user.first_name|default:user.username }}, please enter and confirm your new password.</p>
        {% if messages %}
            {% for msg in messages %}
                <div class="alert {% if msg.tags %}alert-{{ msg.tags }}{% endif %}">{{ msg }}</div>
            {% endfor %}
        {% endif %}
        <form method="post" action="{% url 'reset_password_confirm' token=token %}">
            {% csrf_token %}
            <div class="form-group password-wrapper">
                <input class="desktop1-input" type="password" id="new_password" name="new_password" placeholder="New password" required />
                <img src="{% static 'eye-open.png' %}" class="toggle-password" data-target="new_password" alt="Show Password" style="cursor:pointer; position:absolute; right:12px; top:50%; transform:translateY(-50%);" />
            </div>
            <div class="form-group password-wrapper">
                <input class="desktop1-input" type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required />
                <img src="{% static 'eye-open.png' %}" class="toggle-password" data-target="confirm_password" alt="Show Password" style="cursor:pointer; position:absolute; right:12px; top:50%; transform:translateY(-50%);" />
            </div>
            <button type="submit" class="desktop1-button">
                <span>Reset Password</span>
            </button>
        </form>
        <div class="reset-actions">
            <a href="{% url 'signin' %}" class="reset-link">Back to Sign In</a>
        </div>
    </div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.toggle-password').forEach(function(icon) {
        icon.addEventListener('click', function() {
            const input = document.getElementById(this.dataset.target);
            if (!input) return;
            if (input.type === 'password') {
                input.type = 'text';
                this.src = '{% static "eye-closed.png" %}';
            } else {
                input.type = 'password';
                this.src = '{% static "eye-open.png" %}';
            }
        });
    });
});
</script>
</body>
</html>

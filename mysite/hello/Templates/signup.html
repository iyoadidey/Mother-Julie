<!DOCTYPE html>
<html lang="english">
<head>
  <title>Mother Julie — Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta charset="utf-8" />

  {% load static %}
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="{% static 'signup.css' %}" rel="stylesheet" />
</head>

<body>
  <div class="desktop1-container1">
    <div class="terms-card">
      <img src="{% static 'dashboardpics/mother_julie_logo.png' %}" alt="Mother Julie Logo" class="motherjulielogo" />
      <span class="desktop1-text3">SIGN UP</span>

      <!-- Hidden div for Django messages -->
      <div id="django-messages-data" style="display: none;">
        {% if messages %}
          {% for message in messages %}
            <div class="error-msg">{{ message }}</div>
          {% endfor %}
        {% endif %}
      </div>

      <form id="signup-form" action="{% url 'signup' %}" method="POST">
        {% csrf_token %}
        <!-- rest of your form -->
        <div class="input-container">
          <input type="text" placeholder="First Name" name="first_name" value="{{ request.POST.first_name }}" required />
          <input type="text" placeholder="Last Name" name="last_name" value="{{ request.POST.last_name }}" required />
        </div>

        <input name="username" type="text" class="desktop1-input" placeholder="Username" value="{{ request.POST.username }}" required />
        <input name="email" type="email" class="desktop1-input" placeholder="Email" value="{{ request.POST.email }}" required />

        <div class="password-wrapper">
          <input name="password1" type="password" class="desktop1-input" placeholder="Password" id="password1" required />
          <img src="{% static 'eye-open.png' %}" class="toggle-password" data-target="password1" alt="Show Password" />
        </div>

        <div class="password-wrapper">
          <input name="password2" type="password" class="desktop1-input" placeholder="Confirm password" id="password2" required />
          <img src="{% static 'eye-open.png' %}" class="toggle-password" data-target="password2" alt="Show Password" />
        </div>

        <div class="desktop1-agreement-row">
          <div class="heart-container" title="Agree">
            <input type="checkbox" class="checkbox" id="agreement" name="agreement" required />
            <div class="svg-container">
              <svg viewBox="0 0 24 24" class="svg-outline" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.5,1.917a6.4,6.4,0,0,0-5.5,3.3,6.4,6.4,0,0,0-5.5-3.3A6.8,6.8,0,0,0,0,8.967c0,4.547,4.786,9.513,8.8,12.88a4.974,4.974,0,0,0,6.4,0C19.214,18.48,24,13.514,24,8.967A6.8,6.8,0,0,0,17.5,1.917Zm-3.585,18.4a2.973,2.973,0,0,1-3.83,0C4.947,16.006,2,11.87,2,8.967a4.8,4.8,0,0,1,4.5-5.05A4.8,4.8,0,0,1,11,8.967a1,1,0,0,0,2,0,4.8,4.8,0,0,1,4.5-5.05A4.8,4.8,0,0,1,22,8.967C22,11.87,19.053,16.006,13.915,20.313Z"></path>
              </svg>
              <svg viewBox="0 0 24 24" class="svg-filled" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.5,1.917a6.4,6.4,0,0,0-5.5,3.3,6.4,6.4,0,0,0-5.5-3.3A6.8,6.8,0,0,0,0,8.967c0,4.547,4.786,9.513,8.8,12.88a4.974,4.974,0,0,0,6.4,0C19.214,18.48,24,13.514,24,8.967A6.8,6.8,0,0,0,17.5,1.917Z"></path>
              </svg>
            </div>
          </div>
          <label for="agreement" class="agreement-text">
            By continuing, you agree to our <br>
            <a href="{% url 'terms' %}" class="desktop1-link">Terms & Conditions</a> and
            <a href="{% url 'terms' %}" class="desktop1-link">Privacy Notice</a>
          </label>
        </div>

        <button type="submit" class="desktop1-button" aria-label="Sign Up">
          <span class="desktop1-text7">Sign Up</span>
        </button>

        <p class="desktop1-bottom-link">
          Already have an account?
          <a href="{% url 'signin' %}" class="desktop1-link">Sign In</a>
        </p>
      </form>
    </div>
  </div>

  <!-- Toast element -->
  <div id="toast">
    <div class="toast-message"></div>
  </div>

  <script>
    let currentToastTimeout = null;
    
    function getDjangoMessages() {
        const container = document.getElementById('django-messages-data');
        if (!container) return [];
        
        const messages = [];
        const errorDivs = container.querySelectorAll('.error-msg');
        errorDivs.forEach(function(div) {
            const text = div.textContent.trim();
            if (text) messages.push(text);
        });
        return messages;
    }
    
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        if (!toast) return;
        
        const toastMessage = toast.querySelector('.toast-message');
        
        if (currentToastTimeout) {
            clearTimeout(currentToastTimeout);
        }
        
        toast.style.animation = 'none';
        toast.style.display = 'none';
        toast.offsetHeight;
        
        toastMessage.textContent = message;
        toast.className = '';
        toast.classList.add(type === 'success' ? 'toast-success' : 'toast-error');
        
        toast.style.display = 'block';
        toast.style.animation = 'fadeIn 0.3s ease';
        
        currentToastTimeout = setTimeout(() => {
            toast.style.animation = 'fadeOut 0.5s ease forwards';
            setTimeout(() => { 
                if (toast.style.display !== 'none') {
                    toast.style.display = 'none'; 
                }
                toast.style.animation = '';
                currentToastTimeout = null;
            }, 500);
        }, 3000);
    }

    document.querySelectorAll(".toggle-password").forEach(function(icon) {
        icon.addEventListener("click", function() {
            const input = document.getElementById(this.dataset.target);
            if (input.type === "password") {
                input.type = "text";
                this.src = "{% static 'eye-closed.png' %}";
            } else {
                input.type = "password";
                this.src = "{% static 'eye-open.png' %}";
            }
        });
    });

    document.addEventListener('DOMContentLoaded', function() {
        const messages = getDjangoMessages();
        if (messages.length > 0) {
            messages.forEach(function(message, index) {
                setTimeout(function() {
                    showToast(message, 'error');
                }, index * 2000);
            });
        }
    });
  </script>
</body>
</html>

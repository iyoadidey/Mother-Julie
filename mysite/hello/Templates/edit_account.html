<!DOCTYPE html>
<html lang="english">
<head>
  <title>Mother Julie - Edit Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta charset="utf-8" />

  <style data-tag="reset-style-sheet">
    html { line-height: 1.15; }
    body { margin: 0; }
    * { box-sizing: border-box; border-width: 0; border-style: solid; -webkit-font-smoothing: antialiased; }
    p,li,ul,pre,div,h1,h2,h3,h4,h5,h6,figure,blockquote,figcaption { margin: 0; padding: 0; }
    button { background-color: transparent; }
    button,input,optgroup,select,textarea { font-family: inherit; font-size: 100%; line-height: 1.15; margin: 0; }
    button,select { text-transform: none; }
    button,[type="button"],[type="reset"],[type="submit"] { -webkit-appearance: button; appearance: button; color: inherit; }
    button::-moz-focus-inner,[type="button"]::-moz-focus-inner,[type="reset"]::-moz-focus-inner,[type="submit"]::-moz-focus-inner { border-style: none; padding: 0; }
    a { color: inherit; text-decoration: inherit; }
    pre { white-space: normal; }
    input { padding: 2px 4px; }
    img { display: block; }
    html { scroll-behavior: smooth; }
  </style>

  <style data-tag="default-style-sheet">
    html { font-family: Inter; font-size: 16px; }
    body {
      font-weight: 400;
      font-style: normal;
      text-decoration: none;
      text-transform: none;
      letter-spacing: normal;
      line-height: 1.15;
    }
  </style>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" data-tag="font" />
  {% load static %}
  <link href="{% static 'signup.css' %}" rel="stylesheet" />
  <style>
    .edit-account-subtext {
      font-size: 14px;
      color: #666;
      margin: -10px 0 18px;
      line-height: 1.5;
    }

    .edit-account-actions {
      display: flex;
      gap: 10px;
      margin-top: 22px;
      align-items: stretch;
    }

    .edit-account-secondary {
      width: auto;
      min-width: 150px;
      height: 49px;
      padding: 0 18px;
      background-color: #fff;
      color: #ff5b89;
      border: 1.5px solid #ffb3cc;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex: 0 0 auto;
      transition: 0.3s;
    }

    .edit-account-actions .desktop1-button {
      margin-top: 0;
      height: 49px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 1 1 auto;
    }

    .edit-account-secondary:hover {
      background-color: #fff3f8;
      transform: translateY(-2px);
    }

    .edit-account-note {
      font-size: 13px;
      color: #666;
      margin-top: 14px;
      line-height: 1.5;
    }

    .messages-container {
      position: static;
      margin: 0 0 18px 0;
      max-width: none;
    }

    @media (max-width: 520px) {
      .edit-account-actions {
        flex-direction: column-reverse;
      }

      .edit-account-secondary,
      .desktop1-button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="desktop1-container1">
    <div class="terms-card">
      <img src="{% static 'dashboardpics/mother_julie_logo.png' %}" alt="Mother Julie Logo" class="motherjulielogo" />
      <span class="desktop1-text3">EDIT ACCOUNT</span>
      <p class="edit-account-subtext">Update your account details using the same format as sign up.</p>

      {% if messages %}
      <div class="messages-container">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
          {{ message }}
        </div>
        {% endfor %}
      </div>
      {% endif %}

      <form id="edit-account-form" action="{% url 'edit_account' %}" method="POST">
        {% csrf_token %}

        <div class="input-container">
          <input type="text" placeholder="First Name" name="first_name" value="{{ request.user.first_name }}" required />
          <input type="text" placeholder="Last Name" name="last_name" value="{{ request.user.last_name }}" required />
        </div>

        <input name="username" type="text" class="desktop1-input" placeholder="Username" value="{{ request.user.username }}" required />
        <input name="email" type="email" class="desktop1-input" placeholder="Email" value="{{ request.user.email }}" required />

        <div class="edit-account-actions">
          <a href="{% url 'dashboard' %}" class="edit-account-secondary">Back</a>
          <button type="submit" class="desktop1-button" aria-label="Save Changes">
            <span class="desktop1-text7">Save Changes</span>
          </button>
        </div>

        <p class="edit-account-note">
          If you need to change your password, use the reset password option from sign in.
        </p>
      </form>
    </div>
  </div>

  <script>
  document.addEventListener('DOMContentLoaded', function() {
      const editForm = document.getElementById('edit-account-form');
      const usernameInput = document.querySelector('input[name="username"]');
      
      if (editForm && usernameInput) {
          editForm.addEventListener('submit', function(e) {
              const username = usernameInput.value.trim();
              const usernameRegex = /^[a-zA-Z0-9_]+$/;
              
              if (!usernameRegex.test(username)) {
                  e.preventDefault();
                  alert('Username can only contain letters, numbers, and underscores.');
                  usernameInput.focus();
                  return false;
              }
              
              if (username.length < 3) {
                  e.preventDefault();
                  alert('Username must be at least 3 characters long.');
                  usernameInput.focus();
                  return false;
              }
              
              if (username.length > 20) {
                  e.preventDefault();
                  alert('Username cannot be longer than 20 characters.');
                  usernameInput.focus();
                  return false;
              }
          });
          
          usernameInput.addEventListener('input', function() {
              const username = this.value;
              const usernameRegex = /^[a-zA-Z0-9_]*$/;
              
              if (!usernameRegex.test(username)) {
                  this.style.borderColor = 'red';
                  this.value = username.replace(/[^a-zA-Z0-9_]/g, '');
              } else {
                  this.style.borderColor = '';
              }
          });
      }
  });
  </script>
</body>
</html>

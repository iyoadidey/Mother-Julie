{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Request Password Reset</title>
  <link href="{% static 'signin.css' %}" rel="stylesheet" />

  <style>
    body { background:#fff; font-family:Inter,Arial,sans-serif; }
    .reset-page { max-width: 420px; margin:80px auto; padding: 26px; border-radius:12px; box-shadow:0 10px 26px rgba(0,0,0,0.08); }
    .reset-page h1{color:#ff5b89;text-align:center;margin-bottom:16px;}
    .reset-page p{color:#666;text-align:center;margin-bottom:20px;}
    .reset-page .form-group{margin-bottom:14px;}
    .reset-page input{width:100%;padding:12px 14px;border:1px solid #dcdcdc;border-radius:8px;font-size:0.95rem;}
    .reset-page button{width:100%;padding:12px 14px;border:none;border-radius:8px;background:#ff5b89;color:white;font-weight:700;cursor:pointer;}
    .reset-page a{color:#ff5b89;display:inline-block;margin-top:12px;text-align:center;width:100%;}
    .alert{padding:11px 14px;border-radius:8px;margin-bottom:15px;text-align:center;font-size:0.9rem;}
    .alert-success{background:#e9f9f6;color:#1b6e59;}
    .alert-error{background:#fdecea;color:#b92130;}
  </style>
</head>
<body>
  <div class="reset-page">
    <h1>Forgot Password</h1>
    {% if messages %}
      {% for msg in messages %}
        <div class="alert {% if msg.tags %}alert-{{ msg.tags }}{% endif %}">{{ msg }}</div>
      {% endfor %}
    {% endif %}
    <p>Enter your email and we'll send a secure password reset link.</p>

    <form method="post" action="{% url 'request_password_reset' %}">
      {% csrf_token %}
      <div class="form-group">
        <input required type="email" name="email" placeholder="Email address" />
      </div>
      <button type="submit">Send Reset Link</button>
    </form>

    <a href="{% url 'signin' %}">Back to Sign In</a>
  </div>
</body>
</html>

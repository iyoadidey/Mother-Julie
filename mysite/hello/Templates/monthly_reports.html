<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Report - Mother Julie</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container-reports {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #d63384;
            margin: 0;
            font-size: 28px;
            font-weight: 700;
        }

        .back-link {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid #667eea;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: #667eea;
            color: white;
        }

        .months-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .months-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .months-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .year-filter {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .year-filter label {
            font-size: 12px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .year-filter select {
            border: 1px solid #d0d0d0;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            background: #fff;
            min-width: 110px;
        }

        .months-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .months-scroll::-webkit-scrollbar {
            height: 6px;
        }

        .months-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .months-scroll::-webkit-scrollbar-thumb {
            background: #d63384;
            border-radius: 3px;
        }

        .month-btn {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            color: #333;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .month-btn:hover {
            border-color: #d63384;
            color: #d63384;
        }

        .month-btn.active {
            background: #d63384;
            color: white;
            border-color: #d63384;
            box-shadow: 0 4px 10px rgba(214, 51, 132, 0.3);
        }

        .content-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1024px) {
            .content-container {
                grid-template-columns: 1fr;
            }
        }

        .card-custom {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-custom:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #f0f3fa 100%);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid #d63384;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #333;
        }

        .stat-subtext {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }

        .highest-sale {
            border-left-color: #28a745 !important;
        }

        .lowest-sale {
            border-left-color: #ffc107 !important;
        }

        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            height: 400px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #d63384;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        .error-message.active {
            display: block;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 14px;
        }

        .summary-total {
            background: linear-gradient(135deg, #d63384 0%, #b8285b 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }

        .summary-total-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .summary-total-value {
            font-size: 36px;
            font-weight: 700;
        }

        .summary-total-month {
            font-size: 14px;
            opacity: 0.85;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container-reports">
        <div class="header">
            <h1>📊 Sales Report</h1>
            <a href="/admin_dashboard/" class="back-link">← Back to Dashboard</a>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <!-- Months Container -->
        <div class="months-container">
            <div class="months-header">
                <div class="months-title">Select Month</div>
                <div class="year-filter">
                    <label for="yearFilter">Year</label>
                    <select id="yearFilter"></select>
                </div>
            </div>
            <div class="months-scroll" id="monthsScroll">
                <div class="loading active">
                    <div class="spinner"></div>
                    Loading months...
                </div>
            </div>
        </div>

        <!-- Content Container -->
        <div class="content-container">
            <!-- Statistics -->
            <div class="card-custom">
                <div class="summary-total">
                    <div class="summary-total-label">Total Sales</div>
                    <div class="summary-total-value" id="totalSales">Php 0.00</div>
                    <div class="summary-total-month" id="selectedMonth">Select a month</div>
                </div>

                <div class="stats-grid">
                    <div class="stat-item highest-sale">
                        <div class="stat-label">Highest Sale</div>
                        <div class="stat-value" id="highestDay">-</div>
                        <div class="stat-subtext" id="highestAmount">Php 0.00</div>
                    </div>
                    <div class="stat-item lowest-sale">
                        <div class="stat-label">Lowest Sale</div>
                        <div class="stat-value" id="lowestDay">-</div>
                        <div class="stat-subtext" id="lowestAmount">Php 0.00</div>
                    </div>
                </div>
            </div>

            <!-- Chart -->
            <div class="chart-container">
                <div class="chart-title">Daily Sales Trend</div>
                <div class="loading active" id="chartLoading">
                    <div class="spinner"></div>
                    Generating chart...
                </div>
                <canvas id="salesChart" style="display: none;"></canvas>
                <div class="no-data" id="noData" style="display: none;">
                    No sales data available for this month
                </div>
            </div>
        </div>
    </div>

    <script>
        let chartInstance = null;
        let selectedYear = null;
        let selectedMonth = null;
        const monthNames = [
            'January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'
        ];

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            initializeYearFilter();
            loadMonthlyReports();
        });

        function initializeYearFilter() {
            const yearFilter = document.getElementById('yearFilter');
            const now = new Date();
            const startYear = 2026;
            const currentYear = now.getFullYear();
            const endYear = Math.max(currentYear, startYear);

            let options = '';
            for (let year = endYear; year >= startYear; year--) {
                options += `<option value="${year}">${year}</option>`;
            }

            yearFilter.innerHTML = options;
            selectedYear = endYear;
            yearFilter.value = String(selectedYear);

            yearFilter.addEventListener('change', function(event) {
                selectedYear = parseInt(event.target.value, 10);
                selectedMonth = selectedMonth || 1;
                loadMonthlyReports(selectedYear, selectedMonth);
            });
        }

        function loadMonthlyReports(year = null, month = null) {
            const loading = document.getElementById('chartLoading');
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.classList.remove('active');
            loading.classList.add('active');

            const targetYear = year || selectedYear;
            const targetMonth = month || selectedMonth;
            const url = targetYear && targetMonth
                ? `/api/monthly-reports/${targetYear}/${targetMonth}/`
                : `/api/monthly-reports/`;

            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.error) {
                        throw new Error(data.error);
                    }

                    // Keep the selected values in sync with API response
                    selectedYear = data.year;
                    selectedMonth = data.month;
                    document.getElementById('yearFilter').value = String(selectedYear);

                    // Render month buttons
                    renderMonthButtons(data);

                    // Update statistics
                    updateStatistics(data);

                    // Render chart
                    renderChart(data);

                    loading.classList.remove('active');
                })
                .catch(error => {
                    console.error('Error:', error);
                    errorMsg.textContent = 'Error loading monthly reports: ' + error.message;
                    errorMsg.classList.add('active');
                    loading.classList.remove('active');
                });
        }

        function renderMonthButtons(data) {
            const container = document.getElementById('monthsScroll');
            const currentYear = data.year;
            const currentMonth = data.month;

            let html = '';
            monthNames.forEach((monthName, index) => {
                const monthNumber = index + 1;
                const isActive = monthNumber === currentMonth;
                const activeClass = isActive ? 'active' : '';
                html += `<button class="month-btn ${activeClass}" 
                            onclick="loadMonthlyReports(${currentYear}, ${monthNumber})"
                            title="${monthName}">
                            ${monthName}
                        </button>`;
            });

            container.innerHTML = html;
        }

        function updateStatistics(data) {
            // Update total sales
            document.getElementById('totalSales').textContent = `Php ${parseFloat(data.total_sales).toFixed(2)}`;
            document.getElementById('selectedMonth').textContent = data.month_name;

            // Update highest sale
            const highestDay = data.highest_sales_day;
            const highestAmount = parseFloat(data.highest_sales_amount).toFixed(2);
            document.getElementById('highestDay').textContent = highestDay || '-';
            document.getElementById('highestAmount').textContent = highestDay ? `Php ${highestAmount}` : 'No sales';

            // Update lowest sale
            const lowestDay = data.lowest_sales_day;
            const lowestAmount = parseFloat(data.lowest_sales_amount).toFixed(2);
            document.getElementById('lowestDay').textContent = lowestDay || '-';
            document.getElementById('lowestAmount').textContent = lowestDay ? `Php ${lowestAmount}` : 'No sales';
        }

        function renderChart(data) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            const noDataDiv = document.getElementById('noData');
            const canvas = document.getElementById('salesChart');

            // Prepare chart data
            const dailySales = data.daily_sales;
            const days = Object.keys(dailySales).map(d => parseInt(d)).sort((a, b) => a - b);
            
            if (days.length === 0) {
                canvas.style.display = 'none';
                noDataDiv.style.display = 'block';
                return;
            }

            canvas.style.display = 'block';
            noDataDiv.style.display = 'none';

            const labels = days.map(d => `Day ${d}`);
            const salesValues = days.map(d => dailySales[d]);

            // Calculate average for reference line
            const average = salesValues.reduce((a, b) => a + b, 0) / salesValues.length;

            // Destroy previous chart if it exists
            if (chartInstance) {
                chartInstance.destroy();
            }

            // Create new chart
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Daily Sales (Php)',
                            data: salesValues,
                            borderColor: '#d63384',
                            backgroundColor: 'rgba(214, 51, 132, 0.1)',
                            borderWidth: 3,
                            tension: 0.4,
                            fill: true,
                            pointRadius: 6,
                            pointBackgroundColor: '#d63384',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            pointHoverRadius: 8,
                            pointHoverBackgroundColor: '#b8285b',
                            segment: {
                                borderColor: ctx => ctx.p0DataIndex === -1 ? 'rgba(214, 51, 132, 0.3)' : '#d63384'
                            }
                        },
                        {
                            label: 'Average',
                            data: Array(days.length).fill(average),
                            borderColor: '#667eea',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            fill: false,
                            pointRadius: 0,
                            pointHoverRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                font: {
                                    size: 12,
                                    weight: '600'
                                },
                                padding: 15,
                                usePointStyle: true,
                                color: '#333'
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            padding: 12,
                            titleFont: {
                                size: 14,
                                weight: 'bold'
                            },
                            bodyFont: {
                                size: 13
                            },
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': Php ' + parseFloat(context.parsed.y).toFixed(2);
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Sales Amount (Php)',
                                font: {
                                    size: 12,
                                    weight: '600'
                                }
                            },
                            ticks: {
                                callback: function(value) {
                                    return 'Php ' + value.toFixed(0);
                                },
                                font: {
                                    size: 11
                                },
                                color: '#888'
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)',
                                drawBorder: false
                            }
                        },
                        x: {
                            ticks: {
                                font: {
                                    size: 11
                                },
                                color: '#888'
                            },
                            grid: {
                                display: false,
                                drawBorder: false
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
